name: Backend CI

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  detect-backend-changes:
    name: Detect Backend Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'

  unit:
    name: Unit Tests
    needs: detect-backend-changes
    if: needs.detect-backend-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run unit tests
        run: go test ./...

  integration:
    name: Integration Tests
    needs: detect-backend-changes
    if: needs.detect-backend-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mysecretpassword
          POSTGRES_DB: mydatabase
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myuser -d mydatabase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      MODE: test
      PORT: 8080
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: myuser
      DB_PASSWORD: mysecretpassword
      DB_NAME: mydatabase
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run integration tests
        run: go test -tags integration -v ./cmd/api/... -timeout 60s
